<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea of Thieves - Пиратская Сцена</title>
  <link rel="stylesheet" href="pirate-styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
</head>
<body>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="container">
    <h1 class="title">Sea of Thieves</h1>
    
    <div class="svg-wrapper">
      <object 
        type="image/svg+xml" 
        data="pirate-scene.svg" 
        class="pirate-scene"
        aria-label="Анимированная пиратская сцена в стиле Sea of Thieves">
        Ваш браузер не поддерживает SVG
      </object>
    </div>

    <p class="subtitle">Приключения на семи морях</p>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot ship"></span>
        <span>Пиратский корабль</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot kraken"></span>
        <span>Кракен</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot treasure"></span>
        <span>Сокровища</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot ghost"></span>
        <span>Корабль-призрак</span>
      </div>
    </div>
  </div>
</body>
</html>
