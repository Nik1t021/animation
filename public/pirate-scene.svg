<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" id="pirate-scene">
  <defs>
    <radialGradient id="skyGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a2e">
        <animate attributeName="stop-color" values="#1a0a2e;#2d1b4e;#1a0a2e" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0d0d1a">
        <animate attributeName="stop-color" values="#0d0d1a;#1a1a3e;#0d0d1a" dur="8s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a4a5c"/>
      <stop offset="50%" stop-color="#063545"/>
      <stop offset="100%" stop-color="#021a22"/>
    </linearGradient>
    <linearGradient id="goldFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a847"/>
      <stop offset="25%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="75%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d4a847"/>
    </linearGradient>
    <linearGradient id="shipWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c4033"/>
      <stop offset="100%" stop-color="#3d2817"/>
    </linearGradient>
    <linearGradient id="sailGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5f5dc"/>
      <stop offset="100%" stop-color="#d4c4a8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="150"/>
    </clipPath>
  </defs>
  <circle cx="200" cy="200" r="175" fill="none" stroke="url(#goldFrame)" stroke-width="8">
    <animate attributeName="stroke-width" values="8;10;8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#goldFrame)" stroke-width="3"/>
  <g class="frame-decorations">
    <path d="M200 20 L210 35 L200 30 L190 35 Z" fill="url(#goldFrame)">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M200 380 L210 365 L200 370 L190 365 Z" fill="url(#goldFrame)">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M20 200 L35 210 L30 200 L35 190 Z" fill="url(#goldFrame)">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" begin="1s"/>
    </path>
    <path d="M380 200 L365 210 L370 200 L365 190 Z" fill="url(#goldFrame)">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>
  <g clip-path="url(#circleClip)">
    <rect x="50" y="50" width="300" height="300" fill="url(#skyGradient)"/>
    <g class="stars">
      <circle cx="100" cy="100" r="1.5" fill="#fff">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="80" r="1" fill="#fff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <circle cx="250" cy="90" r="1.5" fill="#fff">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite" begin="0.7s"/>
      </circle>
      <circle cx="300" cy="120" r="1" fill="#fff">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="120" cy="130" r="1" fill="#fff">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="280" cy="150" r="1.2" fill="#fff">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.7s" repeatCount="indefinite" begin="1.2s"/>
      </circle>
    </g>
    <circle cx="300" cy="100" r="25" fill="#f4e99b" filter="url(#glow)">
      <animate attributeName="r" values="25;27;25" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="295" cy="95" r="22" fill="url(#skyGradient)"/>
    <ellipse cx="200" cy="320" rx="200" ry="100" fill="url(#oceanGradient)"/>
    <g class="waves">
      <path d="M50 250 Q100 240 150 250 T250 250 T350 250" fill="none" stroke="#1a6e8e" stroke-width="3" opacity="0.6">
        <animate attributeName="d" values="M50 250 Q100 240 150 250 T250 250 T350 250; M50 250 Q100 260 150 250 T250 250 T350 250; M50 250 Q100 240 150 250 T250 250 T350 250" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M50 270 Q100 260 150 270 T250 270 T350 270" fill="none" stroke="#0d4a5c" stroke-width="2" opacity="0.5">
        <animate attributeName="d" values="M50 270 Q100 260 150 270 T250 270 T350 270; M50 270 Q100 280 150 270 T250 270 T350 270; M50 270 Q100 260 150 270 T250 270 T350 270" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      </path>
      <path d="M50 290 Q100 280 150 290 T250 290 T350 290" fill="none" stroke="#0a3d4d" stroke-width="2" opacity="0.4">
        <animate attributeName="d" values="M50 290 Q100 280 150 290 T250 290 T350 290; M50 290 Q100 300 150 290 T250 290 T350 290; M50 290 Q100 280 150 290 T250 290 T350 290" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      </path>
    </g>
    <g class="ship">
      <animateTransform attributeName="transform" type="translate" values="0,0; 5,3; 0,0; -5,3; 0,0" dur="4s" repeatCount="indefinite"/>
      <path d="M120 260 L140 290 L260 290 L280 260 Q200 250 120 260" fill="url(#shipWood)" stroke="#2a1810" stroke-width="2"/>
      <line x1="140" y1="275" x2="260" y2="275" stroke="#2a1810" stroke-width="1"/>
      <circle cx="160" cy="280" r="3" fill="#2a1810"/>
      <circle cx="200" cy="280" r="3" fill="#2a1810"/>
      <circle cx="240" cy="280" r="3" fill="#2a1810"/>
      <rect x="195" y="160" width="10" height="110" fill="#3d2817"/>
      <path d="M160 170 Q200 180 240 170 L235 230 Q200 240 165 230 Z" fill="url(#sailGradient)" stroke="#8b7355" stroke-width="1">
        <animate attributeName="d" values="M160 170 Q200 180 240 170 L235 230 Q200 240 165 230 Z; M160 170 Q200 175 240 170 L235 230 Q200 235 165 230 Z; M160 170 Q200 180 240 170 L235 230 Q200 240 165 230 Z" dur="3s" repeatCount="indefinite"/>
      </path>
      <g class="skull" transform="translate(200, 200)">
        <ellipse cx="0" cy="0" rx="15" ry="12" fill="#333"/>
        <ellipse cx="-6" cy="-2" rx="4" ry="3" fill="#1a0a2e"/>
        <ellipse cx="6" cy="-2" rx="4" ry="3" fill="#1a0a2e"/>
        <path d="M-5 6 L0 8 L5 6" fill="none" stroke="#1a0a2e" stroke-width="2"/>
        <line x1="-18" y1="15" x2="18" y2="-5" stroke="#333" stroke-width="4" stroke-linecap="round"/>
        <line x1="18" y1="15" x2="-18" y2="-5" stroke="#333" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g class="flag">
        <rect x="198" y="140" width="4" height="25" fill="#3d2817"/>
        <path d="M202 140 L235 150 L202 160 Z" fill="#1a1a1a">
          <animate attributeName="d" values="M202 140 L235 150 L202 160 Z; M202 140 L230 148 L202 160 Z; M202 140 L235 150 L202 160 Z" dur="1.5s" repeatCount="indefinite"/>
        </path>
        <circle cx="215" cy="150" r="5" fill="#fff">
          <animate attributeName="cx" values="215;212;215" dur="1.5s" repeatCount="indefinite"/>
        </circle>
      </g>
      <path d="M265 255 L280 260 L275 290 L260 290 Z" fill="#4a3020"/>
      <rect x="270" y="250" width="8" height="12" fill="#d4a847"/>
      <ellipse cx="274" cy="256" rx="3" ry="4" fill="#ffcc00">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="0.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g class="ghost-ship" opacity="0.3">
      <animateTransform attributeName="transform" type="translate" values="-50,0; 50,0; -50,0" dur="30s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="8s" repeatCount="indefinite"/>
      <path d="M80 220 L90 235 L130 235 L140 220 Q110 215 80 220" fill="#2a5a6a"/>
      <rect x="105" y="195" width="4" height="30" fill="#3a6a7a"/>
      <path d="M90 200 L110 205 L125 200 L120 220 L95 220 Z" fill="#4a8a9a" opacity="0.7"/>
    </g>
    <g class="kraken">
      <path d="M320 300 Q330 270 310 240 Q300 220 315 200" fill="none" stroke="#4a2a4a" stroke-width="12" stroke-linecap="round" opacity="0.7">
        <animate attributeName="d" values="M320 300 Q330 270 310 240 Q300 220 315 200; M320 300 Q340 275 320 245 Q310 225 320 210; M320 300 Q330 270 310 240 Q300 220 315 200" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0.7;0" dur="10s" repeatCount="indefinite"/>
      </path>
      <circle cx="315" cy="200" r="8" fill="#6a3a6a" opacity="0">
        <animate attributeName="opacity" values="0;0.7;0.7;0" dur="10s" repeatCount="indefinite"/>
      </circle>
    </g>
    <g class="treasure" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" dur="15s" repeatCount="indefinite" begin="5s"/>
      <rect x="85" y="285" width="30" height="20" fill="#8b4513" rx="2"/>
      <rect x="85" y="283" width="30" height="5" fill="#a0522d" rx="2"/>
      <rect x="98" y="280" width="4" height="8" fill="#ffd700"/>
      <ellipse cx="100" cy="279" rx="8" ry="5" fill="#ffd700">
        <animate attributeName="ry" values="5;6;5" dur="1s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <g class="parrot">
      <animateTransform attributeName="transform" type="translate" values="0,0; 150,30; 300,0" dur="12s" repeatCount="indefinite"/>
      <ellipse cx="80" cy="150" rx="8" ry="5" fill="#ff4444">
        <animate attributeName="ry" values="5;3;5" dur="0.3s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="75" cy="148" r="4" fill="#ffcc00"/>
      <path d="M88 150 L100 148 L88 152" fill="#ff4444">
        <animate attributeName="d" values="M88 150 L100 148 L88 152; M88 150 L100 155 L88 152; M88 150 L100 148 L88 152" dur="0.3s" repeatCount="indefinite"/>
      </path>
    </g>
    <g class="foam">
      <circle cx="130" cy="295" r="3" fill="#fff" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="145" cy="292" r="2" fill="#fff" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <circle cx="255" cy="293" r="2.5" fill="#fff" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.2s" repeatCount="indefinite" begin="0.6s"/>
      </circle>
      <circle cx="270" cy="296" r="2" fill="#fff" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.9s" repeatCount="indefinite" begin="1s"/>
      </circle>
    </g>
  </g>
  <g class="compass-lines" stroke="url(#goldFrame)" stroke-width="1" opacity="0.6">
    <line x1="200" y1="30" x2="200" y2="45"/>
    <line x1="200" y1="355" x2="200" y2="370"/>
    <line x1="30" y1="200" x2="45" y2="200"/>
    <line x1="355" y1="200" x2="370" y2="200"/>
    <line x1="63" y1="63" x2="75" y2="75"/>
    <line x1="337" y1="63" x2="325" y2="75"/>
    <line x1="63" y1="337" x2="75" y2="325"/>
    <line x1="337" y1="337" x2="325" y2="325"/>
  </g>
  <g class="rotating-ring">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="60s" repeatCount="indefinite"/>
    <circle cx="200" cy="200" r="185" fill="none" stroke="url(#goldFrame)" stroke-width="1" stroke-dasharray="5,10" opacity="0.4"/>
  </g>
</svg>
